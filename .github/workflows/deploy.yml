name: Deploy to ari-server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.134.225.245
          username: ari
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ari/public_html/projects/video-coaching"
            REPO_URL="https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/rossi256/video-coaching.git"

            # Clone or update
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main
            echo "Code at $(git rev-parse --short HEAD)"

            # Install dependencies
            npm ci --omit=dev

            # Ensure uploads directory exists
            mkdir -p uploads

            # Reload PM2
            pm2 delete wingcoach 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "Deploy complete."
