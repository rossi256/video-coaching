name: Deploy to ari-server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.134.225.245
          username: ari
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ari/apps/video-coaching"

            # Clone or pull latest code
            if [ -d "$APP_DIR/.git" ]; then
              echo "Pulling latest code..."
              cd $APP_DIR
              git pull origin main
            elif [ -d "$APP_DIR" ]; then
              echo "Directory exists but no git repo — initialising..."
              cd $APP_DIR
              git init
              git remote add origin https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/rossi256/video-coaching.git
              git fetch origin main
              git checkout -f -B main origin/main
            else
              echo "First deploy - cloning repo..."
              git clone https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/rossi256/video-coaching.git $APP_DIR
              cd $APP_DIR
            fi

            cd $APP_DIR

            # Remove any old static files from public_html that block the Apache proxy
            rm -rf /home/ari/public_html/projects/video-coaching

            # Install/update dependencies (skip dev deps in production)
            npm ci --omit=dev

            # Ensure uploads directory exists
            mkdir -p uploads

            # Restart or start with PM2
            if pm2 list | grep -q 'wingcoach'; then
              echo "Restarting wingcoach..."
              pm2 restart wingcoach
            else
              echo "Starting wingcoach for the first time..."
              pm2 start ecosystem.config.js
              pm2 save
            fi

            echo "Deploy complete. App running on port 3010."
