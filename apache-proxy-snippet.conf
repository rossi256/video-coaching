# Add this block inside BOTH VirtualHost sections of ari.tricktionary.com.conf
# (the :80 and :443 blocks), BEFORE the closing </VirtualHost> tag.
# Place it after the existing "ProxyPass /.well-known !" line.

    # WingCoach Node.js app
    ProxyPass /projects/video-coaching/ http://localhost:3010/
    ProxyPassReverse /projects/video-coaching/ http://localhost:3010/

# NOTE: The app must be started with BASE_PATH=/projects/video-coaching in .env
# so Express knows it's served under a subpath.
